<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Matemática 9º ano - Prof Valdeck Francisco</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="stage">
  <header>
    <div class="brand-group">
      <div class="title-wrap">
        <h1>SAEPE 2026 <br/>Matemática 9º ano</h1>

        <p>Prof. Valdeck Francisco</p>

        <p>Escola Erundina Negreiros — GRE Recife Norte</p>
      </div>
    </div>
  </header>

    <div id="quiz-box" class="slide-card">

      <div class="progress">
        <div class="bar" id="progress-bar"></div>
      </div>

      <h3 id="question-counter"></h3>

      <h2 id="question"></h2>

      <ul id="options" class="bullets"></ul>

      <button id="next-btn" class="btn">
        Próxima
      </button>

    </div>


    <div id="result-box" class="slide-card hidden">

      <h2>🎉 Resultado Final</h2>

      <p class="result-score">
        Você acertou
        <strong><span id="score"></span></strong> de
        <strong><span id="total"></span></strong> questões
      </p>

      <div class="result-progress">
        <div id="result-bar"></div>
      </div>

      <p id="result-percent"></p>
      <p id="result-message"></p>

      <button id="restart-btn" class="btn secondary">
        Jogar Novamente
      </button>

    </div>

  </div>

  <script>
    const questions = [
      {
        question: `01. A distância média entre a Terra e o Sol é de aproximadamente 149.600.000 km. Como esse valor é expresso em notação científica?`,
        options: ["14,96 x 10⁷ km", "1,496 x 10⁸ km", "0,1496 x 10⁹ km", "1,496 x 10⁷ km"],
        answer: 1
      },
      {
        question: `02. O tamanho de um glóbulo vermelho é de cerca de 0,000007 metros. Em notação científica, esse valor é:`,
        options: ["7 x 10⁻⁶ m", "7 x 10⁻⁵ m", "70 x 10⁻⁷ m", "0,7 x 10⁻⁵ m"],
        answer: 0
      },
      {
        question: `03. Um investidor percebeu que seu capital dobra a cada mês. Se ele começou com R$ 2³, quanto terá após 4 meses (ou seja, multiplicando por 2⁴ )?`,
        options: ["2⁷", "2¹²", "4⁷", "2⁻¹"],
        answer: 0
      },
      {
        question: `04. O valor da expressão 5⁻² representa uma fração de um terreno. Que fração é essa?`,
        options: ["-25", "1/10", "1/25", "2/5"],
        answer: 2
      },
      {
        question: `05. Simplifique a expressão utilizada em um cálculo de física: 10⁵ . 10² / 10³`,
        options: ["10¹⁰", "10⁴", "10⁷", "10⁰"],
        answer: 1
      },
      {
        question: `06. Ao calcular a área de um quadrado de lado x³, obtemos ( x³)². Qual a forma simplificada?`,
        options: ["x⁵", "x⁶", "x⁹", "2x³"],
        answer: 1
      },
      {
        question: `07. Em um mapa de constelações, as estrelas são representadas por:`,
        options: ["Retas", "Planos", "Pontos", "Segmentos"],
        answer: 2
      },
      {
        question: `08. A superfície de uma mesa de bilhar perfeitamente nivelada sugere a ideia geométrica de:`,
        options: ["Reta", "Plano", "Ponto", "Ângulo"],
        answer: 1
      },
      {
        question: `09. A fórmula do aluguel de um carro é C = 50 + 2x, onde x é a distância percorrida. Se o custo total foi R$150,00, quantos km foram percorridos?`,
        options: ["50 km", "100 km", "200 km", "75 km"],
        answer: 0
      },
      {
        question: `10. Resolva a equação 3x - 12 = 18 para encontrar a idade de um jovem.`,
        options: ["6", "10", "15", "30"],
        answer: 1
      },
      {
        question: `11. Dois ângulos são complementares. Se um deles mede 35⁰, quanto mede o outro?`,
        options: ["55°", "145°", "90°", "180°"],
        answer: 0
      },
      {
        question: `12. Um ângulo e seu suplementar estão em uma linha reta. Se o ângulo mede 120⁰, seu suplemento é:`,
        options: ["60°", "90°", "30°", "180°"],
        answer: 0
      },
      {
        question: `13. Em um triângulo isósceles, os ângulos da base são iguais. Se o ângulo do topo mede 40⁰, quanto mede cada ângulo da base?`,
        options: ["40°", "70°", "140°", "90°"],
        answer: 1
      },
      {
        question: `14. Um triângulo possui ângulos de 90⁰ e 30⁰. Qual a medida do terceiro ângulo?`,
        options: ["30°", "60°", "90°", "180°"],
        answer: 1
      },
      {
        question: `15. Qual é a soma dos ângulos internos de um pentágono regular (5 lados)?`,
        options: ["360°", "540°", "720°", "180°"],
        answer: 1
      },
      {
        question: `16. Duas retas paralelas são cortadas por uma transversal. Se um ângulo alterno interno mede 50⁰, o seu par correspondente mede:`,
        options: ["130°", "50°", "90°", "180°"],
        answer: 1
      },
      {
        question: `17. A distância aproximada da Terra ao Sol é 1,5 x 10⁸. Essa distância em km é:`,
        options: ["1500 km", "150.000.000 km", "150.000 km", "150 km"],
        answer: 1
      },
      {
        question: `18. Um microscópio identificou uma bactéria que mede 0,000004 m. Esse número em notação científica é:`,
        options: ["4 x 10⁻³", "4 x 10⁻⁴", "4 x 10⁻⁵", "4 x 10⁻⁶"],
        answer: 3
      },
      {
        question: `19. Um computador realiza 2⁵ operações por segundo em um determinado teste. Quantas operações são realizadas?`,
        options: ["10", "25", "32", "64"],
        answer: 2
      },
      {
        question: `20. O valor de 10⁻³ é:`,
        options: ["0,1", "0,01", "0,001", "0,0001"],
        answer: 2
      },
      {
        question: `21. Em um exercício de matemática apareceu a expressão: 2³ x 2⁴. O resultado é:`,
        options: ["2⁷", "2¹²", "4⁷", "8⁴"],
        answer: 0
      },
      {
        question: `22. Simplificando a expressão: 5⁶ ÷ 5² temos:`,
        options: ["5⁴", "5³", "5⁸", "5¹²"],
        answer: 0
      },
      {
        question: `23. Em um mapa, uma cidade pode ser representada por um ponto, uma estrada por uma linha e uma região por uma superfície. Na geometria, essa superfície é chamada de:`,
        options: ["Reta", "Ângulo", "Segmento", "Plano"],
        answer: 3
      },
      {
        question: `24. Dois pontos distintos em um plano determinam:`,
        options: ["Um plano", "Um ângulo", "Uma reta", "Um triângulo"],
        answer: 2
      },
      {
        question: `25. A fórmula da área do quadrado é: A = l². Se o lado mede 6 cm, qual será a área?`,
        options: ["12 cm²", "24 cm²", "36 cm²", "48 cm²"],
        answer: 2
      },
      {
        question: `26. A fórmula da velocidade é: V = d/t. Se um carro percorre 120 km em 2 horas, qual é a velocidade?`,
        options: ["40", "50", "60", "70"],
        answer: 2
      },
      {
        question: `27. Em uma loja, João comprou um caderno e pagou R$ 15. Sabendo que a equação é: x + 5 = 15. O valor de x é:`,
        options: ["5", "8", "10", "12"],
        answer: 2
      },
      {
        question: `28. Resolva a equação: 2x = 18. A solução é:`,
        options: ["6", "7", "8", "9"],
        answer: 3
      },
      {
        question: `29. Dois ângulos são complementares quando somam:`,
        options: ["90°", "120°", "180°", "360°"],
        answer: 0
      },
      {
        question: `30. Se um ângulo mede 110°, o seu suplementar mede:`,
        options: ["70°", "60°", "80°", "50°"],
        answer: 0
      },
      {
        question: `31. A soma dos ângulos internos de qualquer triângulo é:`,
        options: ["90°", "180°", "270°", "360°"],
        answer: 1
      },
      {
        question: `32. Se dois ângulos de um triângulo medem 50° e 60°, o terceiro mede:`,
        options: ["60°", "70°", "80°", "90°"],
        answer: 1
      },
      {
        question: `33. A soma dos ângulos internos de um quadrilátero é:`,
        options: ["180°", "270°", "360°", "540°"],
        answer: 2
      },
      {
        question: `34. Um heptágono possui soma dos ângulos internos igual a:`,
        options: ["360°", "540°", "180°", "900°"],
        answer: 3
      },
      {
        question: `35. Quando duas retas se cruzam formando um ângulo de 90°, elas são chamadas de:`,
        options: ["Paralelas", "Opostas", "Concorrentes", "Perpendiculares"],
        answer: 3
      },
      {
        question: `36. Em duas retas paralelas cortadas por uma transversal, os ângulos alternos internos são:`,
        options: ["Diferentes", "Opostos", "Iguais", "Complementares"],
        answer: 2
      },
      {
        question: `37. Um observatório registrou que uma estrela está a aproximadamente 3.000.000.000 km da Terra. Esse número em notação científica pode ser escrito como:`,
        options: ["3 x 10⁶", "3 x 10⁷", "3 x 10⁹", "3 x 10¹⁰"],
        answer: 2
      },
      {
        question: `38. Durante uma aula de matemática, o professor apresentou a expressão: 3² x 3³. Aplicando a propriedade das potências de mesma base, o resultado é:`,
        options: ["3⁵", "3⁶", "9⁵", "6⁵"],
        answer: 0
      },
      {
        question: `39. Em uma papelaria, Maria comprou um lápis e um caderno. O caderno custa R$ 8 e ela pagou R$ 20 no total. A situação pode ser representada pela equação: x + 8 = 20. O valor de x (preço do lápis) é:`,
        options: ["10", "12", "14", "16"],
        answer: 1
      },
      {
        question: `40. Durante uma aula de geometria, o professor Valdeck explicou que dois ângulos são complementares quando sua soma é 90°. Se um ângulo mede 35°, o outro ângulo complementar mede:`,
        options: ["45°", "50°", "55°", "65°"],
        answer: 2
      }
    ];

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const progressBar = document.getElementById("progress-bar");

    const quizBox = document.getElementById("quiz-box");
    const resultBox = document.getElementById("result-box");

    const scoreEl = document.getElementById("score");
    const totalEl = document.getElementById("total");

    const restartBtn = document.getElementById("restart-btn");

    const questionCounterEl = document.getElementById("question-counter");

    let currentQuestion = 0;
    let score = 0;

    totalEl.textContent = questions.length;

    function loadQuestion() {

      const q = questions[currentQuestion];

      questionEl.textContent = q.question;

      optionsEl.innerHTML = "";

      q.options.forEach((opt, i) => {

        const li = document.createElement("li");

        li.textContent = opt;

        li.classList.add("option");

        li.addEventListener("click", () => selectOption(i));

        optionsEl.appendChild(li);

      });

      nextBtn.style.display = "none";

      updateProgress();

      questionCounterEl.textContent =
        `Questão ${currentQuestion + 1} de ${questions.length}`;

    }

    function selectOption(index) {

      const q = questions[currentQuestion];

      const allOptions = document.querySelectorAll(".option");

      allOptions.forEach((opt, i) => {

        if (i === q.answer) opt.classList.add("correct");

        if (i === index && i !== q.answer) opt.classList.add("wrong");

        opt.style.pointerEvents = "none";

      });

      if (index === q.answer) score++;

      nextBtn.style.display = "block";

    }

    nextBtn.addEventListener("click", () => {

      currentQuestion++;

      if (currentQuestion < questions.length) {

        loadQuestion();

      } else {

        showResult();

      }

    });

    function updateProgress() {

      const pct = ((currentQuestion) / questions.length) * 100;

      progressBar.style.width = pct + "%";

    }

    function showResult() {

      quizBox.classList.add("hidden");

      resultBox.classList.remove("hidden");

      scoreEl.textContent = score;

      const percent = Math.round((score / questions.length) * 100);

      const resultBar = document.getElementById("result-bar");

      const resultPercent = document.getElementById("result-percent");

      const resultMessage = document.getElementById("result-message");

      resultBar.style.width = percent + "%";

      resultPercent.textContent = percent + "% de aproveitamento";

      let msg = "";

      if (percent >= 90) {

        msg = "🏆 Excelente! Você domina o conteúdo!";
        resultBar.style.background = "#16a34a";

      }

      else if (percent >= 70) {

        msg = "👏 Muito bom! Continue assim!";
        resultBar.style.background = "#22c55e";

      }

      else if (percent >= 50) {

        msg = "🙂 Resultado razoável. Dá para melhorar!";
        resultBar.style.background = "#f59e0b";

      }

      else {

        msg = "📚 Você precisa revisar o conteúdo.";
        resultBar.style.background = "#dc2626";

      }

      resultMessage.textContent = msg;

      progressBar.style.width = "100%";

    }

    restartBtn.addEventListener("click", () => {

      score = 0;

      currentQuestion = 0;

      resultBox.classList.add("hidden");

      quizBox.classList.remove("hidden");

      loadQuestion();

    });

    loadQuestion();

  </script>
</body>
</html>
