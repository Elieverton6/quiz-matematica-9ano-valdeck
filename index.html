<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Matemática 1º ano - Prof Valdeck Francisco</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="stage">
  <header>
    <div class="brand-group">
      <div class="title-wrap">
        <h1>SAEPE 2026 <br/>Matemática 9º ano</h1>

        <p>Prof. Valdeck Francisco</p>

        <p>Escola Erundina Negreiros — GRE Recife Norte</p>
      </div>
    </div>
  </header>

    <div id="quiz-box" class="slide-card">

      <div class="progress">
        <div class="bar" id="progress-bar"></div>
      </div>

      <h3 id="question-counter"></h3>

      <h2 id="question"></h2>

      <ul id="options" class="bullets"></ul>

      <button id="next-btn" class="btn">
        Próxima
      </button>

    </div>


    <div id="result-box" class="slide-card hidden">

      <h2>🎉 Resultado Final</h2>

      <p class="result-score">
        Você acertou
        <strong><span id="score"></span></strong> de
        <strong><span id="total"></span></strong> questões
      </p>

      <div class="result-progress">
        <div id="result-bar"></div>
      </div>

      <p id="result-percent"></p>
      <p id="result-message"></p>

      <button id="restart-btn" class="btn secondary">
        Jogar Novamente
      </button>

    </div>

  </div>

  <script>
    const questions = [
      {
        question: `01. A distância média entre a Terra e o Sol é de aproximadamente 149.600.000 km. Como esse valor é expresso em notação científica?`,
        options: ["14,96 x 10⁷ km", "1,496 x 10⁸ km", "0,1496 x 10⁹ km", "1,496 x 10⁷ km"],
        answer: 1
      },
      {
        question: `02. O tamanho de um glóbulo vermelho é de cerca de 0,000007 metros. Em notação científica, esse valor é:`,
        options: ["7 x 10⁻⁶ m", "7 x 10⁻⁵ m", "70 x 10⁻⁷ m", "0,7 x 10⁻⁵ m"],
        answer: 0
      },
      {
        question: `03. Um investidor percebeu que seu capital dobra a cada mês. Se ele começou com R$ 2³, quanto terá após 4 meses (multiplicando por 2⁴)?`,
        options: ["2⁷", "2¹²", "4⁷", "2⁻¹"],
        answer: 0
      },
      {
        question: `04. O valor da expressão 5⁻² representa uma fração de um terreno. Que fração é essa?`,
        options: ["-25", "1/10", "1/25", "2/5"],
        answer: 2
      },
      {
        question: `05. Simplifique: (10⁵ × 10²) ÷ 10³`,
        options: ["10¹⁰", "10⁴", "10⁷", "10⁰"],
        answer: 1
      },
      {
        question: `06. Ao calcular a área de um quadrado de lado x³, temos (x³)². Forma simplificada?`,
        options: ["x⁵", "x⁶", "x⁹", "2x³"],
        answer: 1
      },
      {
        question: `07. Em um mapa de constelações, as estrelas são representadas por:`,
        options: ["Retas", "Planos", "Pontos", "Segmentos"],
        answer: 2
      },
      {
        question: `08. A superfície de uma mesa nivelada representa:`,
        options: ["Reta", "Plano", "Ponto", "Ângulo"],
        answer: 1
      },
      {
        question: `09. C = 50 + 2x. Se C = 150, quantos km foram percorridos?`,
        options: ["50 km", "100 km", "200 km", "75 km"],
        answer: 0
      },
      {
        question: `10. Resolva: 3x - 12 = 18`,
        options: ["6", "10", "15", "30"],
        answer: 1
      },
      {
        question: `11. Ângulo complementar de 35°:`,
        options: ["55°", "145°", "90°", "180°"],
        answer: 0
      },
      {
        question: `12. Ângulo suplementar de 120°:`,
        options: ["60°", "90°", "30°", "180°"],
        answer: 0
      },
      {
        question: `13. Triângulo isósceles (ângulo topo 40°):`,
        options: ["40°", "70°", "140°", "90°"],
        answer: 1
      },
      {
        question: `14. Triângulo com 90° e 30°: terceiro ângulo?`,
        options: ["30°", "60°", "90°", "180°"],
        answer: 1
      },
      {
        question: `15. Soma dos ângulos internos de um pentágono:`,
        options: ["360°", "540°", "720°", "180°"],
        answer: 1
      },
      {
        question: `16. Ângulo alterno interno de 50°: correspondente?`,
        options: ["130°", "50°", "90°", "180°"],
        answer: 1
      },
      {
        question: `17. 1,5 x 10⁸ em km:`,
        options: ["1500 km", "150.000.000 km", "150.000 km", "150 km"],
        answer: 1
      },
      {
        question: `18. 0,000004 em notação científica:`,
        options: ["4 x 10⁻³", "4 x 10⁻⁴", "4 x 10⁻⁵", "4 x 10⁻⁶"],
        answer: 3
      },
      {
        question: `19. 2⁵ operações:`,
        options: ["10", "25", "32", "64"],
        answer: 2
      },
      {
        question: `20. 10⁻³ =`,
        options: ["0,1", "0,01", "0,001", "0,0001"],
        answer: 2
      },
      {
        question: `21. 2³ × 2⁴ =`,
        options: ["2⁷", "2¹²", "4⁷", "8⁴"],
        answer: 0
      },
      {
        question: `22. 5⁶ ÷ 5² =`,
        options: ["5⁴", "5³", "5⁸", "5¹²"],
        answer: 0
      },
      {
        question: `23. Superfície na geometria é:`,
        options: ["Reta", "Ângulo", "Segmento", "Plano"],
        answer: 3
      },
      {
        question: `24. Dois pontos determinam:`,
        options: ["Plano", "Ângulo", "Reta", "Triângulo"],
        answer: 2
      },
      {
        question: `25. Área do quadrado lado 6:`,
        options: ["12", "24", "36", "48"],
        answer: 2
      },
      {
        question: `26. Velocidade (120 km em 2h):`,
        options: ["40", "50", "60", "70"],
        answer: 2
      },
      {
        question: `27. x + 5 = 15`,
        options: ["5", "8", "10", "12"],
        answer: 2
      },
      {
        question: `28. 2x = 18`,
        options: ["6", "7", "8", "9"],
        answer: 3
      },
      {
        question: `29. Ângulos complementares somam:`,
        options: ["90°", "120°", "180°", "360°"],
        answer: 0
      },
      {
        question: `30. Suplementar de 110°:`,
        options: ["70°", "60°", "80°", "50°"],
        answer: 0
      },
      {
        question: `31. Soma dos ângulos de um triângulo:`,
        options: ["90°", "180°", "270°", "360°"],
        answer: 1
      },
      {
        question: `32. 50° e 60° → terceiro ângulo:`,
        options: ["60°", "70°", "80°", "90°"],
        answer: 1
      },
      {
        question: `33. Quadrilátero soma:`,
        options: ["180°", "270°", "360°", "540°"],
        answer: 2
      },
      {
        question: `34. Heptágono soma:`,
        options: ["360°", "540°", "180°", "900°"],
        answer: 3
      },
      {
        question: `35. Retas com 90°:`,
        options: ["Paralelas", "Opostas", "Concorrentes", "Perpendiculares"],
        answer: 3
      },
      {
        question: `36. Alternos internos:`,
        options: ["Diferentes", "Opostos", "Iguais", "Complementares"],
        answer: 2
      },
      {
        question: `37. 3.000.000.000 em notação científica:`,
        options: ["3 x 10⁶", "3 x 10⁷", "3 x 10⁹", "3 x 10¹⁰"],
        answer: 2
      },
      {
        question: `38. 3² × 3³ =`,
        options: ["3⁵", "3⁶", "9⁵", "6⁵"],
        answer: 0
      },
      {
        question: `39. x + 8 = 20`,
        options: ["10", "12", "14", "16"],
        answer: 1
      },
      {
        question: `40. Complementar de 35°:`,
        options: ["45°", "50°", "55°", "65°"],
        answer: 2
      }
    ];

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const progressBar = document.getElementById("progress-bar");

    const quizBox = document.getElementById("quiz-box");
    const resultBox = document.getElementById("result-box");

    const scoreEl = document.getElementById("score");
    const totalEl = document.getElementById("total");

    const restartBtn = document.getElementById("restart-btn");

    const questionCounterEl = document.getElementById("question-counter");

    let currentQuestion = 0;
    let score = 0;

    totalEl.textContent = questions.length;

    function loadQuestion() {

      const q = questions[currentQuestion];

      questionEl.textContent = q.question;

      optionsEl.innerHTML = "";

      q.options.forEach((opt, i) => {

        const li = document.createElement("li");

        li.textContent = opt;

        li.classList.add("option");

        li.addEventListener("click", () => selectOption(i));

        optionsEl.appendChild(li);

      });

      nextBtn.style.display = "none";

      updateProgress();

      questionCounterEl.textContent =
        `Questão ${currentQuestion + 1} de ${questions.length}`;

    }

    function selectOption(index) {

      const q = questions[currentQuestion];

      const allOptions = document.querySelectorAll(".option");

      allOptions.forEach((opt, i) => {

        if (i === q.answer) opt.classList.add("correct");

        if (i === index && i !== q.answer) opt.classList.add("wrong");

        opt.style.pointerEvents = "none";

      });

      if (index === q.answer) score++;

      nextBtn.style.display = "block";

    }

    nextBtn.addEventListener("click", () => {

      currentQuestion++;

      if (currentQuestion < questions.length) {

        loadQuestion();

      } else {

        showResult();

      }

    });

    function updateProgress() {

      const pct = ((currentQuestion) / questions.length) * 100;

      progressBar.style.width = pct + "%";

    }

    function showResult() {

      quizBox.classList.add("hidden");

      resultBox.classList.remove("hidden");

      scoreEl.textContent = score;

      const percent = Math.round((score / questions.length) * 100);

      const resultBar = document.getElementById("result-bar");

      const resultPercent = document.getElementById("result-percent");

      const resultMessage = document.getElementById("result-message");

      resultBar.style.width = percent + "%";

      resultPercent.textContent = percent + "% de aproveitamento";

      let msg = "";

      if (percent >= 90) {

        msg = "🏆 Excelente! Você domina o conteúdo!";
        resultBar.style.background = "#16a34a";

      }

      else if (percent >= 70) {

        msg = "👏 Muito bom! Continue assim!";
        resultBar.style.background = "#22c55e";

      }

      else if (percent >= 50) {

        msg = "🙂 Resultado razoável. Dá para melhorar!";
        resultBar.style.background = "#f59e0b";

      }

      else {

        msg = "📚 Você precisa revisar o conteúdo.";
        resultBar.style.background = "#dc2626";

      }

      resultMessage.textContent = msg;

      progressBar.style.width = "100%";

    }

    restartBtn.addEventListener("click", () => {

      score = 0;

      currentQuestion = 0;

      resultBox.classList.add("hidden");

      quizBox.classList.remove("hidden");

      loadQuestion();

    });

    loadQuestion();

  </script>
</body>
</html>
